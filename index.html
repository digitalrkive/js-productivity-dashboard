<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DashBuddy</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="main-container">

    <div class="content">
<!-- nav -->
      <div class="side-bar">
           <ul class="nav-list">
              <li class="nav-item active" data-page="home">Home</li>
              <li class="nav-item" data-page="calendar">Calendar</li>
              <li class="nav-item" data-page="todo">To-Do</li>
            </ul>
      </div>
     

      <div class="main-content">

        <div class="logo-container">
          <img src="dashbuddy_logo_v2.svg" alt="DashBuddy" height="150" />
        </div>
<!-- home dash -->
        <div class="page" id="home">

          <div class="header-container">
            <h1>Hello. I am DashBuddy.</h1>
            <p>I have detected you need organising. I am pleased to assist.</p>
          </div>

          <div class="audio-widget">
            <audio controls loop>
              <source src="Jomon Grove - The Mini Vandals.mp3" type="audio/mpeg">
            </audio>
          </div>

          <div class="widget" id="clock-container">
            <h2>Clock</h2>
            <p id="clock"></p>
          </div>

          <div class="widget" id="todo-widget">
            <h2>To-Do</h2>
            <input type="text" id="todo-input" placeholder="Add a task..." />
            <button id="todo-add">Add Task</button>
            <ul id="todo-list"></ul>
          </div>

          <div class="widget" id="notes-widget">
            <h2>Notes</h2>
            <textarea id="notes" rows="5" placeholder="Note something down..."></textarea>
          </div>

        </div>
<!-- calendar -->
        <div class="page" id="calendar" >
          <h1>Calendar</h1>
          <p>Coming soon...</p>
        </div>
<!-- todo -->
        <div class="page" id="todo" style="display:none">
        <h1>To-Do</h1>
        <table id="todo-table">
          <thead>
            <tr>
              <th>Done</th>
              <th>Task</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="todo-body"></tbody>
        </table>
      </div>

      </div>
    </div>
  </div>
  <!-- toast -->
<div id="toast">Task added! View in the To-Do tab.</div>

<!-- Edit -->
<div id="modal-overlay" style="display:none">
  <div id="modal">
    <h2>Edit Task</h2>
    <input type="text" id="modal-input" placeholder="Edit your task..." />
    <div id="modal-buttons">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save">Save</button>
    </div>
  </div>
</div>
  <script src="index.js"></script>
</body>
</html>
